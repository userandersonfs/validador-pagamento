# Ajuste "app" pro nome que voce escolher no "fly launch".
app = "validador-pagamento"
primary_region = "gru"  # Sao Paulo

[build]

[env]
  PORT = "3000"
  TZ = "America/Sao_Paulo"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0  # escala pra zero quando ocioso (custo baixo)

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"  # Tesseract + sharp cabem bem
